name: Reproducibility

on:
  push:
  pull_request:

jobs:
  offline-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: make install-dev
      - run: python -m draft_room_intelligence.cli --help
      - run: make check
